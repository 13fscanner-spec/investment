<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestAI — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-body);
      overflow: hidden;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .login-brand svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
    }
    
    .login-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    
    .login-form .form-group {
      margin-bottom: 1.5rem;
    }
    
    .login-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
    }
    
    .login-form input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-body);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    
    .login-form input:focus {
      outline: none;
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.2);
    }
    
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 1rem;
    }
    
    .login-btn:hover {
      opacity: 0.9;
    }

    .error-msg {
      color: var(--negative-color);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
    
    .error-msg.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <svg viewBox="0 0 28 28" fill="none">
        <path d="M4 20L10 12L16 16L24 6" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18 6H24V12" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="g1" x1="4" y1="6" x2="24" y2="20"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
      <h1>Acceder a InvestAI</h1>
    </div>
    
    <div class="login-card">
      <form id="login-form" class="login-form">
        <div id="login-error" class="error-msg">Usuario o contraseña incorrectos.</div>
        
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Tu usuario" required autocomplete="username" autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Tu contraseña privada" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="login-btn" id="login-btn">
          Ingresar al Portafolio
        </button>
      </form>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
